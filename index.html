<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: transparent; }
        #ui { position: absolute; z-index: 9999; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; }
        button { padding: 15px 25px; border-radius: 30px; border: none; background: #e91e63; color: white; font-weight: bold; }
    </style>
</head>
<body>
    <div id="ui">
        <button id="lightBtn">Luz ON/OFF</button>
    </div>

    <video id="miVideo" src="./video.mp4" loop="true" playsinline webkit-playsinline muted crossorigin="anonymous" style="display:none"></video>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind; autoStart: true;" 
             embedded 
             renderer="colorManagement: true; preserveDrawingBuffer: true;" 
             vr-mode-ui="enabled: false">
        
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
        
        <a-entity mindar-image-target="targetIndex: 0">
            <a-video src="#miVideo" width="1.5" height="2.66" position="0 0 0"></a-video>
            <a-light id="myLight" type="ambient" intensity="1"></a-light>
        </a-entity>
    </a-scene>

    <script>
        const video = document.querySelector("#miVideo");
        const light = document.querySelector("#myLight");
        const scene = document.querySelector('a-scene');

        // Activación de video
        scene.addEventListener("targetFound", () => video.play());
        scene.addEventListener("targetLost", () => video.pause());

        // Botón de luz
        document.querySelector("#lightBtn").addEventListener('click', () => {
            light.setAttribute('intensity', light.getAttribute('intensity') == 1 ? 2.5 : 1);
        });
    </script>
</body>
</html>
