<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        #ui { position: absolute; z-index: 9999; bottom: 20px; width: 100%; text-align: center; }
        button { padding: 15px 30px; font-size: 16px; border-radius: 10px; border: none; background: #e91e63; color: white; margin: 5px; }
    </style>
</head>
<body>
    <div id="ui">
        <button id="recordBtn">Grabar</button>
        <button onclick="window.location.reload()">Recargar</button>
    </div>

    <a-scene 
        mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiLoading: yes; uiError: yes; uiScanning: yes;" 
        embedded 
        color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <video id="miVideo" src="./video.mp4" loop="true" playsinline webkit-playsinline crossorigin="anonymous"></video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
        
        <a-entity mindar-image-target="targetIndex: 0">
            <a-video src="#miVideo" width="1" height="0.56" position="0 0 0"></a-video>
        </a-entity>
    </a-scene>

    <script>
        const video = document.querySelector("#miVideo");
        const scene = document.querySelector('a-scene');

        // Escuchar cuando el target es detectado
        scene.addEventListener("targetFound", () => {
            console.log("Target detectado");
            video.play();
        });

        scene.addEventListener("targetLost", () => {
            console.log("Target perdido");
            video.pause();
        });

        // Grabación
        let chunks = [];
        let recorder;
        document.querySelector("#recordBtn").addEventListener('click', function() {
            const canvas = document.querySelector('a-scene').components.screenshot.getCanvas('perspective');
            const stream = canvas.captureStream(30);
            recorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
            
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'video/webm' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = 'ar_video.webm';
                a.click();
            };
            recorder.start();
            this.innerText = "Grabando...";
            setTimeout(() => { recorder.stop(); this.innerText = "Grabar"; }, 5000); // Graba 5s
        });
    </script>
</body>
</html>
