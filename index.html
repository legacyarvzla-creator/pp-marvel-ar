<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Legacy AR - marvel Premium WebAR</title>
    <script src="https://aframe.io/releases/1.4.1/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.1/dist/mindar-image-aframe.prod.js"></script>

    <style>
        body { margin: 0; overflow: hidden; background-color: black; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        #recording-btn {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            z-index: 1000; width: 70px; height: 70px; border-radius: 50%;
            background-color: #ff0000; border: 4px solid white; cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4); padding: 0; outline: none;
        }
        #recording-btn.recording { background-color: #222; animation: pulse 1s infinite; border-color: #ff0000; }

        #flash-btn {
            position: fixed; bottom: 120px; left: 50%; transform: translateX(-50%);
            z-index: 1000; width: 50px; height: 50px; border-radius: 50%;
            background-color: rgba(0, 0, 0, 0.6); border: 2px solid white;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.3s ease;
        }
        #flash-btn svg { width: 25px; height: 25px; fill: white; }
        #flash-btn.active { background-color: #ffd700; border-color: #ffd700; box-shadow: 0 0 15px #ffd700; }
        #flash-btn.active svg { fill: black; }

        @keyframes pulse { 0%, 100% { transform: translateX(-50%) scale(1); } 50% { transform: translateX(-50%) scale(0.9); } }
        #recording-canvas { display: none; }
        .a-enter-vr, .a-enter-ar { display: none !important; }
    </style>
</head>

<body>
    <div id="flash-btn">
        <svg viewBox="0 0 24 24">
            <path d="M7,2V13H10V22L17,10H13L17,2H7Z" />
        </svg>
    </div>

    <button id="recording-btn"></button>
    <canvas id="recording-canvas"></canvas>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind;" 
             renderer="preserveDrawingBuffer: true; antialias: true; colorManagement: true" 
             vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <video id="vid" src="video.mp4" preload="auto" loop="true" 
                   crossorigin="anonymous" playsinline webkit-playsinline></video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-video src="#vid" width="1" height="1.777" position="0 0 0" rotation="0 0 0" scale="1.15 1.15 1"></a-video>
        </a-entity>
    </a-scene>

    <script>
        // Elementos del DOM
        const btn = document.getElementById("recording-btn");
        const flashBtn = document.getElementById("flash-btn");
        const recordingCanvas = document.getElementById("recording-canvas");
        const ctx = recordingCanvas.getContext('2d', { alpha: false });
        const videoAnim = document.querySelector("#vid");

        let mediaRecorder, chunks = [], isRecording = false;
        let audioCtx, mixer, videoSource, micSource;
        let recordingInterval; // Reemplaza requestAnimationFrame para mantener 30 FPS reales

        // Función para detectar el mejor códec soportado por el dispositivo
        function getSupportedMimeType() {
            const types = [
                'video/webm;codecs=h264', // Excelente rendimiento en Android
                'video/webm;codecs=vp8',  // Más liviano que VP9
                'video/mp4;codecs=avc1',  // Formato ideal para iOS/Safari
                'video/webm'              // Genérico de caída por defecto
            ];
            for (let type of types) {
                if (MediaRecorder.isTypeSupported(type)) {
                    return type;
                }
            }
            return '';
        }

        // Control de la Linterna
        flashBtn.addEventListener('click', async () => {
            try {
                const videoCam = document.querySelector("video:not([id])") || document.querySelector("video");
                const track = videoCam.srcObject.getVideoTracks()[0];
                const caps = track.getCapabilities();
                if (!caps.torch) { alert("Flash no disponible."); return; }
                const constraints = track.getConstraints();
                const active = constraints.advanced && constraints.advanced[0].torch;
                await track.applyConstraints({ advanced: [{ torch: !active }] });
                flashBtn.classList.toggle('active', !active);
            } catch (e) { console.error(e); }
        });

        // Eventos de Target de MindAR
        const targetEl = document.querySelector("[mindar-image-target]");
        targetEl.addEventListener('targetFound', () => videoAnim.play());
        targetEl.addEventListener('targetLost', () => videoAnim.pause());

        // Botón de grabación
        btn.addEventListener('click', async () => {
            if (!isRecording) {
                await initAudio();
                startCapture();
            } else {
                stopCapture();
            }
        });

        async function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                mixer = audioCtx.createMediaStreamDestination();
                videoSource = audioCtx.createMediaElementSource(videoAnim);
                videoSource.connect(mixer);
                videoSource.connect(audioCtx.destination);
                try {
                    const micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    micSource = audioCtx.createMediaStreamSource(micStream);
                    micSource.connect(mixer);
                } catch (e) { console.warn("Micrófono no permitido o no disponible."); }
            }
            if (audioCtx.state === 'suspended') await audioCtx.resume();
        }

        function startCapture() {
            const videoCam = document.querySelector("video:not([id])") || document.querySelector("video");
            const canvasAR = document.querySelector("canvas.a-canvas");

            // Configurar resolución de captura basándose en la cámara interna
            recordingCanvas.width = videoCam.videoWidth || 1280;
            recordingCanvas.height = videoCam.videoHeight || 720;

            // Forzar captura del canvas a 30 FPS estables
            const videoStream = recordingCanvas.captureStream(30);
            
            // Combinar Video del Canvas + Audio Mezclado
            const tracks = [...videoStream.getVideoTracks()];
            if (mixer && mixer.stream.getAudioTracks().length > 0) {
                tracks.push(...mixer.stream.getAudioTracks());
            }
            const combinedStream = new MediaStream(tracks);

            // Selección de códec optimizado y asignación de Bitrate seguro (2.5 Mbps)
            const mimeType = getSupportedMimeType();
            const options = {
                mimeType: mimeType,
                videoBitsPerSecond: 2500000 // Evita archivos gigantes que traban el reproductor
            };

            mediaRecorder = new MediaRecorder(combinedStream, options);
            mediaRecorder.ondataavailable = (e) => { if (e.data && e.data.size > 0) chunks.push(e.data); };
            mediaRecorder.onstop = saveVideo;
            
            isRecording = true;
            mediaRecorder.start(100); // Guardar fragmentos cada 100ms para no saturar memoria

            // Bucle matemático de renderizado fijado exactamente a 30 FPS (1000ms / 30 = ~33.3ms)
            recordingInterval = setInterval(() => {
                if (!isRecording) return;
                // Capa 1: Cámara de fondo
                ctx.drawImage(videoCam, 0, 0, recordingCanvas.width, recordingCanvas.height);
                // Capa 2: Elementos de Realidad Aumentada
                ctx.drawImage(canvasAR, 0, 0, recordingCanvas.width, recordingCanvas.height);
            }, 1000 / 30);

            btn.classList.add('recording');
        }

        function stopCapture() {
            isRecording = false;
            clearInterval(recordingInterval); // Frenamos el bucle inmediatamente
            mediaRecorder.stop();
            btn.classList.remove('recording');
        }

        function saveVideo() {
            const mimeTypeUsed = mediaRecorder.mimeType;
            const blob = new Blob(chunks, { type: mimeTypeUsed });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            
            // Si usa mp4 (iOS) cambia la extensión del archivo descargado
            const ext = mimeTypeUsed.includes('mp4') ? '.mp4' : '.webm';
            a.download = `LegacyAR_Messi_${Date.now()}${ext}`;
            
            document.body.appendChild(a);
            a.click();
            setTimeout(() => {
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }, 200);
            chunks = [];
        }
    </script>
</body>
</html>
