<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR Franela Vertical</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: black; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        
        /* UI principal simplificada y transparente */
        #ui { 
            position: absolute; z-index: 9999; bottom: 30px; left: 50%; 
            transform: translateX(-50%); width: 85%; max-width: 380px;
            display: flex; flex-direction: column; gap: 15px; align-items: center;
        }

        /* Botón de video principal con mejor diseño */
        .btn-principal { 
            padding: 16px 30px; border-radius: 50px; border: none; 
            background: linear-gradient(135deg, #ff4081 0%, #e91e63 100%);
            color: white; font-size: 16px; font-weight: bold; 
            box-shadow: 0 5px 20px rgba(233, 30, 99, 0.4);
            cursor: pointer; width: 100%; transition: all 0.3s ease;
        }
        .btn-principal:active { transform: scale(0.97); box-shadow: 0 2px 10px rgba(233, 30, 99, 0.3); }

        /* Barra de herramientas flotante y translúcida */
        .utilidades-bar {
            display: flex; gap: 15px; justify-content: center; width: 100%;
            padding: 10px; background: rgba(0, 0, 0, 0.5); border-radius: 50px;
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Estilo de los botones circulares mejorado */
        .btn-circular {
            width: 55px; height: 55px; border-radius: 50%; border: none;
            background: rgba(255, 255, 255, 0.15); color: white;
            font-size: 22px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.3s ease;
            position: relative;
        }
        .btn-circular:active { transform: scale(0.9); background: rgba(255, 255, 255, 0.25); }
        .btn-circular.activo { background: rgba(76, 175, 80, 0.8); box-shadow: 0 0 15px rgba(76, 175, 80, 0.5); }
        
        /* Efecto de pulso para cuando está grabando */
        .btn-circular.activo::after {
            content: ''; position: absolute; width: 100%; height: 100%;
            border-radius: 50%; background: inherit; animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.6; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        /* Ocultar el video de precarga */
        #miVideo { position: absolute; width: 1px; height: 1px; opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

    <div id="ui">
        <div class="utilidades-bar">
            <!-- Botón Linterna -->
            <button id="torchButton" class="btn-circular" title="Alternar Linterna">
                <span id="torchIcon">💡</span>
            </button>
            <!-- Botón Grabar con estado visual -->
            <button id="recordButton" class="btn-circular" title="Grabar Pantalla">
                <span id="recordIcon">🔴</span>
            </button>
        </div>
        <!-- Botón Principal -->
        <button id="playButton" class="btn-principal">VER VIDEO EN PANTALLA COMPLETA</button>
    </div>

    <!-- Video para AR: Asegúrate que 'src' sea correcto -->
    <video id="miVideo" src="./video.mp4" preload="auto" crossorigin="anonymous" webkit-playsinline playsinline loop></video>

    <!-- Escena AR optimizada para rastreo estable -->
    <a-scene mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiScanning:no; filterMinCF:0.0005; filterBeta: 0.005;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights, antialias: true;" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <!-- Target para la franela -->
        <a-entity id="franelaTarget" mindar-image-target="targetIndex: 0">
            <!-- Entidad de video que escalaremos dinámicamente para evitar que se achate -->
            <a-video id="arVideoEntity" src="#miVideo" position="0 0 0" opacity="1"></a-video>
        </a-entity>
    </a-scene>

    <script>
        const uiDiv = document.querySelector('#ui');
        const video = document.querySelector('#miVideo');
        const arVideoEntity = document.querySelector('#arVideoEntity');
        const recordButton = document.querySelector('#recordButton');
        const recordIcon = document.querySelector('#recordIcon');
        const torchButton = document.querySelector('#torchButton');
        const torchIcon = document.querySelector('#torchIcon');

        // ============================================================
        // 1. CORRECCIÓN CLAVE: AJUSTE DE ASPECTO VERTICAL DINÁMICO
        // ============================================================
        
        const ajustarProporcionVideoAR = () => {
            if (video.videoWidth > 0 && video.videoHeight > 0) {
                // Obtenemos la relación de aspecto original (ej: 0.5625 para 9:16)
                const ratio = video.videoWidth / video.videoHeight;
                console.log(`Dimensiones de video detectadas: ${video.videoWidth}x${video.videoHeight} (Ratio: ${ratio})`);
                
                // Definimos un ancho base para la franela (puedes ajustar este valor)
                const anchoBase = 1.0; 
                // Calculamos la altura necesaria para mantener la proporción sin achatarse
                const alturaCalculada = anchoBase / ratio;
                
                // Aplicamos las nuevas dimensiones a la entidad A-Frame
                arVideoEntity.setAttribute('width', anchoBase);
                arVideoEntity.setAttribute('height', alturaCalculada);
                console.log(`Entidad AR ajustada a: ${anchoBase}x${alturaCalculada} para evitar deformación.`);
            }
        };

        // Escuchamos cuando el video ha cargado sus metadatos para saber sus dimensiones reales
        if (video.readyState >= 1) {
            ajustarProporcionVideoAR();
        } else {
            video.addEventListener('loadedmetadata', ajustarProporcionVideoAR);
        }


        // ============================================================
        // 2. COMPORTAMIENTO INTERACTIVO SOBRE LA FRANELA (TIPO OZZY)
        // ============================================================
        const franelaTarget = document.querySelector('#franelaTarget');
        
        franelaTarget.addEventListener("targetFound", () => {
            console.log("Franela detectada. Reproduciendo...");
            // Aseguramos que el ajuste de proporción esté aplicado por si acaso
            ajustarProporcionVideoAR();
            video.play().catch(e => console.log("Se requiere interacción para reproducir con audio.
