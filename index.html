<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
        /* Esto asegura que la escena cubra todo el celular sin barras negras */
        a-scene { width: 100vw; height: 100vh; display: block; }
        
        #ui { position: absolute; z-index: 9999; bottom: 20px; width: 100%; text-align: center; }
        button { padding: 15px 30px; border-radius: 25px; border: none; background: #e91e63; color: white; font-weight: bold; }
    </style>
</head>
<body>
    <div id="ui">
        <button id="recordBtn">Grabar</button>
    </div>

    <a-scene 
        mindar-image="imageTargetSrc: ./targets.mind; autoStart: true;" 
        color-space="sRGB" 
        renderer="colorManagement: true" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <video id="miVideo" src="./video.mp4" loop="true" playsinline webkit-playsinline crossorigin="anonymous"></video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
        
        <a-entity mindar-image-target="targetIndex: 0">
            <a-video src="#miVideo" width="1" height="1.777" position="0 0 0"></a-video>
            <a-light id="myLight" type="ambient" intensity="1"></a-light>
        </a-entity>
    </a-scene>

    <script>
        const video = document.querySelector("#miVideo");
        const scene = document.querySelector('a-scene');

        scene.addEventListener("targetFound", () => video.play());
        scene.addEventListener("targetLost", () => video.pause());

        // Grabación simplificada
        document.querySelector("#recordBtn").addEventListener('click', function() {
            const canvas = document.querySelector('canvas');
            const stream = canvas.captureStream(30);
            const recorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
            let chunks = [];
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'video/webm' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = 'grabacion_vertical.webm';
                a.click();
            };
            recorder.start();
            this.innerText = "Deteniendo en 5s...";
            setTimeout(() => { recorder.stop(); this.innerText = "Grabar"; }, 5000);
        });
    </script>
</body>
</html>
