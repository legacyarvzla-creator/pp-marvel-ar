<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
        body { margin: 0; overflow: hidden; }
        #ui { position: absolute; z-index: 9999; bottom: 30px; width: 100%; display: flex; justify-content: center; gap: 10px; }
        button { padding: 15px 25px; border-radius: 20px; border: none; background: #e91e63; color: white; font-weight: bold; }
        #lightBtn { background: #ffc107; color: black; }
    </style>
</head>
<body>
    <div id="ui">
        <button id="recordBtn">Grabar</button>
        <button id="lightBtn">Luz ON/OFF</button>
    </div>

    <a-scene id="scene" mindar-image="imageTargetSrc: ./targets.mind; autoStart: true;" embedded renderer="colorManagement: true" vr-mode-ui="enabled: false">
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
        
        <a-entity id="target" mindar-image-target="targetIndex: 0">
            <a-video id="miVideo" src="./video.mp4" width="0.6" height="1" position="0 0 0" playsinline webkit-playsinline></a-video>
            <a-light id="myLight" type="ambient" intensity="1"></a-light>
        </a-entity>
    </a-scene>

    <script>
        // 1. Lógica de Luz
        const light = document.querySelector("#myLight");
        document.querySelector("#lightBtn").addEventListener('click', () => {
            light.setAttribute('intensity', light.getAttribute('intensity') == 1 ? 2 : 1);
        });

        // 2. Lógica de Grabación (MediaRecorder)
        const scene = document.querySelector('a-scene');
        let chunks = [];
        let recorder;

        document.querySelector("#recordBtn").addEventListener('click', () => {
            const canvas = document.querySelector('canvas');
            const stream = canvas.captureStream(30);
            recorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
            
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'video/webm' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'mi_video_ar.webm';
                a.click();
            };
            recorder.start();
            alert("Grabando... Presiona otra vez para detener y guardar.");
            document.querySelector("#recordBtn").onclick = () => recorder.stop();
        });
    </script>
</body>
</html>
