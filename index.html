<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
        body { margin: 0; overflow: hidden; }
        /* Capa de botones para que siempre estén arriba */
        #ui { position: absolute; z-index: 9999; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; }
        button { padding: 15px 20px; border-radius: 10px; border: none; background: #e91e63; color: white; font-weight: bold; cursor: pointer; }
        #lightBtn { background: #ff9800; }
    </style>
</head>
<body>
    <div id="ui">
        <button id="recordBtn">Grabar Video</button>
        <button id="lightBtn">Cambiar Luz</button>
    </div>

    <a-scene embedded mind-ar="imageTargetSrc: ./targets.mind;" color-space="sRGB" renderer="colorManagement: true" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
        
        <a-entity mindar-image-target="targetIndex: 0">
            <a-video src="#miVideo" width="1" height="0.56" rotation="0 0 0"></a-video>
            <a-light id="myLight" type="directional" intensity="1" position="0 1 0"></a-light>
        </a-entity>
    </a-scene>

    <video id="miVideo" src="./video.mp4" loop="true" playsinline webkit-playsinline crossorigin="anonymous" style="display:none"></video>

    <script>
        const video = document.querySelector("#miVideo");
        const light = document.querySelector("#myLight");
        
        // Iniciar video automáticamente al detectar
        const scene = document.querySelector('a-scene');
        scene.addEventListener("targetFound", () => video.play());
        scene.addEventListener("targetLost", () => video.pause());

        // Control de luz
        document.querySelector("#lightBtn").addEventListener('click', () => {
            const intensity = light.getAttribute('intensity');
            light.setAttribute('intensity', intensity == 1 ? 3 : 1);
        });

        // Grabación de pantalla
        let chunks = [];
        document.querySelector("#recordBtn").addEventListener('click', function() {
            const canvas = document.querySelector('canvas');
            const stream = canvas.captureStream(30);
            const recorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
            
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'video/webm' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = 'grabacion_ar.webm';
                a.click();
            };
            recorder.start();
            this.innerText = "Detener y Guardar";
            this.onclick = () => { recorder.stop(); this.innerText = "Grabar Video"; };
        });
    </script>
</body>
</html>
