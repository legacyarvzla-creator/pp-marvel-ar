<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LegacyAR_Produccion_Final</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: black; font-family: sans-serif; }
        
        #ui { 
            position: absolute; z-index: 9999; bottom: 40px; left: 50%; 
            transform: translateX(-50%); display: flex; gap: 25px;
            padding: 12px 25px; background: rgba(0, 0, 0, 0.6); border-radius: 50px;
            backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-circular {
            width: 60px; height: 60px; border-radius: 50%; border: 2px solid white;
            background: rgba(0, 0, 0, 0.4); color: white;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; position: relative;
        }

        .btn-circular.grabando { background: #f44336; border-color: #f44336; }
        
        #miVideo { position: absolute; width: 1px; height: 1px; opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

    <div id="ui">
        <button id="recordButton" class="btn-circular">
            <svg id="iconRecord" width="24" height="24" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="white"/></svg>
        </button>
        <button id="torchButton" class="btn-circular">
            <svg width="24" height="24" viewBox="0 0 24 24"><path d="M12 2L2 12h3v8h6v-6h2v6h6v-8h3L12 2z" fill="white"/></svg>
        </button>
    </div>

    <video id="miVideo" src="./video.mp4" playsinline webkit-playsinline loop></video>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind; autoStart: true;" 
             embedded renderer="preserveDrawingBuffer: true; colorManagement: true" 
             vr-mode-ui="enabled: false">
        
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity id="target" mindar-image-target="targetIndex: 0">
            <a-video src="#miVideo" width="1" height="1.777" position="0 0 0" scale="1.15 1.15 1"></a-video>
        </a-entity>
    </a-scene>

    <script>
        const video = document.querySelector('#miVideo');
        const recordBtn = document.querySelector('#recordButton');
        const iconRecord = document.querySelector('#iconRecord');
        let isRecording = false, mediaRecorder, chunks = [], loop;

        document.querySelector('a-scene').addEventListener("targetFound", () => video.play());

        recordBtn.addEventListener('click', async () => {
            if (!isRecording) {
                const canvasAR = document.querySelector('canvas');
                const cam = document.querySelector('video:not(#miVideo)');
                
                // Canvas de grabación a resolución fija 1080p para fluidez
                const canvasC = document.createElement('canvas');
                canvasC.width = 1080;
                canvasC.height = 1920;
                const ctx = canvasC.getContext('2d');

                const renderFrame = () => {
                    if (!isRecording) return;
                    ctx.drawImage(cam, 0, 0, canvasC.width, canvasC.height);
                    ctx.drawImage(canvasAR, 0, 0, canvasC.width, canvasC.height);
                    loop = requestAnimationFrame(renderFrame);
                };
                renderFrame();

                // Stream combinado (Video renderizado + Audio original)
                const streamV = canvasC.captureStream(30);
                const streamA = video.captureStream ? video.captureStream() : video.mozCaptureStream();
                const combined = new MediaStream([streamV.getVideoTracks()[0], ...streamA.getAudioTracks()]);

                mediaRecorder = new MediaRecorder(combined, { mimeType: 'video/webm', videoBitsPerSecond: 2500000 });
                chunks = [];
                mediaRecorder.ondataavailable = e => chunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const blob = new Blob(chunks, { type: 'video/webm' });
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(blob);
                    a.download = 'Grabacion_Legacy.webm';
                    a.click();
                };

                mediaRecorder.start();
                isRecording = true;
                recordBtn.classList.add('grabando');
            } else {
                isRecording = false;
                mediaRecorder.stop();
                cancelAnimationFrame(loop);
                recordBtn.classList.remove('grabando');
            }
        });
    </script>
</body>
</html>
